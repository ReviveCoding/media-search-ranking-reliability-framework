project:
  random_seed: 42
  output_dir: artifacts
  reports_dir: reports
  data_dir: data
data:
  movielens_variant: 1m
  movielens_raw_dir: null
  max_movies: 6000
  max_users: 8000
  demo_movies: 300
  demo_users: 180
  demo_ratings: 5000
  synthetic:
    popularity_alpha: 1.05
    preference_strength: 1.35
    rating_noise: 0.7
    tag_observation_prob: 0.45
    exploration_rate: 0.12
    cold_start_fraction: 0.08
enrichment:
  tag_genome_enrichment_path: null
  imdb_enrichment_path: null

queries:
  num_queries: 60
  candidates_per_query: 30
  min_positive_per_query: 3
  label_all_catalog_demo: true
  label_all_catalog_movielens: false
  label_noise: 0.0
retrieval:
  top_k: 30
  hybrid_alpha: 0.55
  dense_backend: auto
  dense_model_name: sentence-transformers/all-MiniLM-L6-v2
  dense_device: auto
  dense_batch_size: 64
  allow_backend_fallback: true
  show_progress_bar: false
  faiss_use_gpu_if_available: true
ranking:
  test_size: 0.2
  val_size: 0.15
  objective: lambdarank
  metric: ndcg
  eval_at:
  - 5
  - 10
  num_leaves: 31
  learning_rate: 0.05
  n_estimators: 60
  min_child_samples: 20
  device_type: auto
  random_seed: 42
  n_jobs: 1
  deterministic: true
  gpu_fallback_to_cpu: true
  allow_non_ranking_fallback: false
evaluation:
  positive_label_min: 2
  latency_max_queries: 25
  latency_warmup_queries: 2
  min_slice_queries_for_claims: 5
calibration:
  method: auto
  positive_label_min: 2
launch_gates:
  ndcg_at_10_min: 0.3
  recall_efficiency_at_10_min: 0.5
  mrr_at_10_min: 0.2
  ece_max: 0.18
  p95_latency_ms_max: 500
  approved_public_or_synthetic_data_only: true
  no_private_user_data: true
  no_production_deployment_claim: true
  ranker_ndcg_lift_min: 0.01
  similar_to_self_return_max: 0.0
  long_tail_hit_rate_min: 0.5
  cold_start_hit_rate_min: 0.5
  required_ranker_backend_prefix: lightgbm-lambdarank
